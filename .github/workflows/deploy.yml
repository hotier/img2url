name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'functions/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'wrangler.toml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  NODE_VERSION: '20'
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Prepare Functions directory
        run: cp -r functions/. dist/functions/

      - name: Remove old R2 binding via API
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # 获取当前部署配置
          RESPONSE=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/img2url" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json")
          
          echo "Current project config: $RESPONSE"
          
          # 提取 deployment_configs.production
          PRODUCTION_CONFIG=$(echo "$RESPONSE" | jq -r '.result.deployment_configs.production // {}')
          
          # 移除 R2 绑定中的 IMAGES
          NEW_CONFIG=$(echo "$PRODUCTION_CONFIG" | jq 'del(.r2_buckets.IMAGES) // .')
          
          echo "New config: $NEW_CONFIG"
          
          # 更新项目配置
          curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/img2url" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"deployment_configs\":{\"production\":$NEW_CONFIG}}"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: img2url
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'

      - name: Set Cloudflare Pages secrets
        run: |
          npx wrangler pages secret put CLOUDFLARE_API_TOKEN --project-name=img2url <<< "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          npx wrangler pages secret put CLOUDFLARE_ACCOUNT_ID --project-name=img2url <<< "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"

name = "img2url"
compatibility_date = "2026-04-15"

[assets]
directory = "./dist"

[dev]
port = 8787

# R2 存储桶绑定
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "img2url-images"

[env.production]
NODE_ENV = "production"

# 环境变量（在 Cloudflare Dashboard 中配置，不要提交到 Git）
# API 配置
# CUSTOM_DOMAIN = "your-custom-domain.pages.dev"

# Turnstile 配置
# TURNSTILE_SITE_KEY = "0x4AAAAAACasWM4vLebpu_B7"
# TURNSTILE_SECRET_KEY = ""

# R2 S3 兼容 API 配置（如果使用）
# R2_S3_ACCESS_KEY_ID = ""
# R2_S3_SECRET_ACCESS_KEY = ""
# R2_S3_ENDPOINT = ""

[vars]
# 公共环境变量（可以提交到 Git）
# CUSTOM_DOMAIN = ""
